<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PhotoAI">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>PhotoAI ✨</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
body {
  font-family:'DM Sans',sans-serif;
  background:#0a0a0f;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  justify-content:center;
  overflow-x:hidden;
}
.app {
  width:100%;
  max-width:430px;
  min-height:100vh;
  min-height:100dvh;
  background:#111118;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow:hidden;
}

/* Header */
.header {
  padding: env(safe-area-inset-top, 14px) 20px 14px;
  padding-top: max(env(safe-area-inset-top, 14px), 14px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
  background:#111118;
}
.logo {
  font-size:22px;
  font-weight:700;
  background:linear-gradient(135deg,#a78bfa,#7c3aed);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  letter-spacing:-0.5px;
}
.logo-sub { font-size:11px; color:#555; margin-top:2px; }
.btn-save {
  background:linear-gradient(135deg,#7c3aed,#a78bfa);
  border:none;
  border-radius:20px;
  color:white;
  padding:9px 18px;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  font-family:inherit;
  display:none;
  box-shadow:0 4px 16px rgba(124,58,237,0.35);
}

/* Image Area */
.image-area {
  margin:0 16px;
  border-radius:20px;
  overflow:hidden;
  background:#1a1a28;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  height:44vw;
  max-height:320px;
  min-height:200px;
  border:2px dashed #2a2a40;
  cursor:pointer;
  flex-shrink:0;
  transition:border 0.3s;
}
.image-area.has-image { border:none; cursor:default; }
.placeholder { text-align:center; color:#444; pointer-events:none; }
.placeholder .ico { font-size:44px; margin-bottom:10px; }
.placeholder .ttl { font-size:15px; font-weight:600; color:#666; }
.placeholder .sub { font-size:11px; margin-top:5px; color:#444; }
#displayCanvas { max-width:100%; max-height:320px; object-fit:contain; border-radius:16px; display:none; }
#hiddenCanvas { display:none; }
.badge {
  position:absolute; top:10px; right:10px;
  background:linear-gradient(135deg,#059669,#10b981);
  border-radius:12px; padding:4px 10px;
  font-size:11px; font-weight:700; color:white; display:none;
}
.overlay {
  position:absolute; inset:0;
  background:rgba(10,10,20,0.88);
  display:none; flex-direction:column;
  align-items:center; justify-content:center;
  border-radius:18px; gap:12px;
}
.overlay.on { display:flex; }
.spinner {
  width:52px; height:52px; border-radius:50%;
  border:3px solid #2a2a3a; border-top:3px solid #a78bfa;
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.ov-txt { color:#a78bfa; font-weight:600; font-size:14px; }
.prog-bg { width:150px; height:4px; background:#2a2a3a; border-radius:2px; overflow:hidden; }
.prog-fill { height:100%; background:linear-gradient(90deg,#7c3aed,#a78bfa); border-radius:2px; transition:width .4s ease; width:0%; }
.prog-n { color:#555; font-size:12px; }

/* Tabs */
.tabs {
  display:none; margin:10px 16px 0;
  background:#1a1a28; border-radius:14px; padding:4px;
}
.tabs.on { display:flex; }
.tab-btn {
  flex:1; padding:9px; border-radius:10px; border:none;
  cursor:pointer; font-family:inherit; font-weight:600;
  font-size:13px; transition:all .2s;
  background:transparent; color:#555;
}
.tab-btn.active {
  background:linear-gradient(135deg,#7c3aed,#a78bfa); color:white;
}

/* Controls */
.controls { padding:10px 16px 0; display:none; }
.controls.on { display:block; }
.chips { display:flex; gap:6px; overflow-x:auto; padding-bottom:8px; scrollbar-width:none; }
.chips::-webkit-scrollbar { display:none; }
.chip {
  flex-shrink:0; padding:7px 13px; border-radius:20px; border:none;
  cursor:pointer; font-family:inherit; font-size:11px; font-weight:600;
  transition:all .2s; background:#1e1e2e; color:#666; white-space:nowrap;
}
.chip.active { background:linear-gradient(135deg,#7c3aed,#a78bfa); color:white; }
.sl-row { display:flex; justify-content:space-between; margin:8px 0 6px; font-size:12px; }
.sl-label { color:#888; } .sl-val { color:#a78bfa; font-weight:700; }
input[type=range] {
  width:100%; -webkit-appearance:none; appearance:none;
  background:#2a2a3a; border-radius:4px; height:5px; outline:none; cursor:pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:24px; height:24px; border-radius:50%;
  background:linear-gradient(135deg,#7c3aed,#a78bfa); cursor:pointer;
  box-shadow:0 2px 10px rgba(124,58,237,.5);
}
.btn-reset {
  margin-top:10px; width:100%; padding:11px; border-radius:12px;
  border:1px solid #2a2a3a; background:transparent; color:#666;
  font-size:13px; font-family:inherit; cursor:pointer; font-weight:600;
}

/* AI Panel */
.ai-panel { padding:10px 16px 0; display:none; text-align:center; }
.ai-panel.on { display:block; }
.ai-desc { color:#555; font-size:12px; margin-bottom:14px; line-height:1.7; }
.btn-ai {
  width:100%; padding:15px; border-radius:16px; border:none;
  background:linear-gradient(135deg,#7c3aed,#a78bfa); color:white;
  font-size:15px; font-family:inherit; font-weight:700; cursor:pointer;
  letter-spacing:.3px; transition:opacity .2s;
  box-shadow:0 6px 20px rgba(124,58,237,.4);
}
.btn-ai:disabled { opacity:.4; cursor:not-allowed; box-shadow:none; }
.btn-undo {
  margin-top:8px; width:100%; padding:11px; border-radius:12px;
  border:1px solid #2a2a3a; background:transparent; color:#666;
  font-size:13px; font-family:inherit; cursor:pointer; font-weight:600; display:none;
}

/* Upload CTA */
.upload-cta { padding:14px 16px; flex-shrink:0; }
.btn-upload {
  width:100%; padding:15px; border-radius:18px; border:none;
  background:linear-gradient(135deg,#7c3aed,#a78bfa); color:white;
  font-size:15px; font-family:inherit; font-weight:700; cursor:pointer;
  box-shadow:0 6px 20px rgba(124,58,237,.35);
}

/* Install Banner */
.install-bar {
  margin:8px 16px 0; padding:11px 14px;
  background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(167,139,250,.1));
  border:1px solid rgba(124,58,237,.3); border-radius:14px;
  display:none; align-items:center; gap:10px; flex-shrink:0;
}
.install-bar.show { display:flex; }
.install-txt { flex:1; font-size:12px; color:#a78bfa; font-weight:500; line-height:1.4; }
.btn-install {
  background:linear-gradient(135deg,#7c3aed,#a78bfa); border:none;
  border-radius:10px; color:white; padding:7px 12px;
  font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap;
}
.btn-close-bar {
  background:none; border:none; color:#555; font-size:16px; cursor:pointer; padding:2px;
}

#fileInput { display:none; }
</style>
</head>
<body>
<div class="app">

  <!-- Install Banner -->
  <div class="install-bar" id="installBar">
    <div class="install-txt">📲 Install PhotoAI on your home screen!</div>
    <button class="btn-install" id="btnInstall">Install</button>
    <button class="btn-close-bar" onclick="closeInstall()">✕</button>
  </div>

  <!-- Header -->
  <div class="header">
    <div>
      <div class="logo">PhotoAI ✨</div>
      <div class="logo-sub">Offline Enhancement</div>
    </div>
    <button class="btn-save" id="btnSave" onclick="downloadImage()">Save ↓</button>
  </div>

  <!-- Image Area -->
  <div class="image-area" id="imageArea" onclick="triggerUpload()">
    <div class="placeholder" id="placeholder">
      <div class="ico">📸</div>
      <div class="ttl">Tap to Upload Photo</div>
      <div class="sub">JPG · PNG · WEBP</div>
    </div>
    <canvas id="displayCanvas"></canvas>
    <canvas id="hiddenCanvas"></canvas>
    <div class="badge" id="badge">✨ AI Enhanced</div>
    <div class="overlay" id="overlay">
      <div class="spinner"></div>
      <div class="ov-txt" id="ovTxt">Processing...</div>
      <div class="prog-bg"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-n" id="progN">0%</div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabs">
    <button class="tab-btn active" id="tabM" onclick="switchTab('m')">✏️ Manual</button>
    <button class="tab-btn" id="tabA" onclick="switchTab('a')">🤖 AI Enhance</button>
  </div>

  <!-- Manual Controls -->
  <div class="controls" id="manualPanel">
    <div class="chips" id="chips"></div>
    <div class="sl-row">
      <span class="sl-label" id="slLabel">Brightness</span>
      <span class="sl-val" id="slVal">0</span>
    </div>
    <input type="range" id="slider" min="-100" max="100" value="0" oninput="onSlide(this.value)">
    <button class="btn-reset" onclick="resetAll()">↺ Reset All</button>
  </div>

  <!-- AI Panel -->
  <div class="ai-panel" id="aiPanel">
    <div class="ai-desc">AI automatically fixes brightness, contrast,<br>sharpness & color balance — 100% offline 🔒</div>
    <button class="btn-ai" id="btnAI" onclick="autoEnhance()">✨ Auto AI Enhance</button>
    <button class="btn-undo" id="btnUndo" onclick="resetAll()">↺ Undo Enhancement</button>
  </div>

  <!-- Upload CTA -->
  <div class="upload-cta" id="uploadCTA">
    <button class="btn-upload" onclick="triggerUpload()">📸 Choose a Photo</button>
  </div>

  <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)">
</div>

<script>
const FILTERS = [
  {id:'brightness',label:'Brightness',icon:'☀️',min:-100,max:100,def:0},
  {id:'contrast',  label:'Contrast',  icon:'◑', min:-100,max:100,def:0},
  {id:'saturation',label:'Saturation',icon:'🎨',min:-100,max:100,def:0},
  {id:'sharpness', label:'Sharpness', icon:'🔍',min:0,   max:100,def:0},
  {id:'warmth',    label:'Warmth',    icon:'🌡️',min:-100,max:100,def:0},
  {id:'exposure',  label:'Exposure',  icon:'📷',min:-100,max:100,def:0},
];

let fv = Object.fromEntries(FILTERS.map(f=>[f.id,f.def]));
let origData = null, activeF = 'brightness', curTab = 'm', enhancing = false;

// Service Worker
if('serviceWorker' in navigator) {
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

// Install prompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBar').classList.add('show');
});
document.getElementById('btnInstall').onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const {outcome} = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBar').classList.remove('show');
};
function closeInstall() {
  document.getElementById('installBar').classList.remove('show');
}

// Build chips
function buildChips() {
  const c = document.getElementById('chips');
  c.innerHTML = '';
  FILTERS.forEach(f => {
    const b = document.createElement('button');
    b.className = 'chip' + (f.id===activeF?' active':'');
    b.textContent = f.icon+' '+f.label;
    b.onclick = ()=>selectFilter(f.id);
    c.appendChild(b);
  });
}
buildChips();

function selectFilter(id) {
  activeF = id;
  const f = FILTERS.find(x=>x.id===id);
  const sl = document.getElementById('slider');
  sl.min=f.min; sl.max=f.max; sl.value=fv[id];
  document.getElementById('slLabel').textContent=f.label;
  setValText(fv[id]);
  buildChips();
}
function setValText(v) {
  document.getElementById('slVal').textContent=(v>0?'+':'')+v;
}
function onSlide(v) {
  fv[activeF]=parseInt(v); setValText(v); applyFilters();
}

function triggerUpload() {
  if(!origData) document.getElementById('fileInput').click();
}

function handleFile(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const maxW=900, scale=img.width>maxW?maxW/img.width:1;
      const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      const cv=document.getElementById('hiddenCanvas');
      cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      origData=cv.getContext('2d').getImageData(0,0,w,h);
      showUI(); applyFilters();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

function showUI() {
  document.getElementById('placeholder').style.display='none';
  document.getElementById('displayCanvas').style.display='block';
  document.getElementById('imageArea').classList.add('has-image');
  document.getElementById('imageArea').onclick=null;
  document.getElementById('tabs').classList.add('on');
  document.getElementById('uploadCTA').style.display='none';
  document.getElementById('btnSave').style.display='block';
  switchTab('m');
}

function switchTab(t) {
  curTab=t;
  document.getElementById('tabM').classList.toggle('active',t==='m');
  document.getElementById('tabA').classList.toggle('active',t==='a');
  document.getElementById('manualPanel').classList.toggle('on',t==='m');
  document.getElementById('aiPanel').classList.toggle('on',t==='a');
}

function applyFilters() {
  if(!origData) return;
  const src=origData.data, w=origData.width, h=origData.height;
  const cv=document.getElementById('hiddenCanvas');
  cv.width=w; cv.height=h;
  const ctx=cv.getContext('2d');
  const id=ctx.createImageData(w,h), dst=id.data;

  const br=fv.brightness/100, co=fv.contrast/100;
  const sa=(fv.saturation+100)/100, wa=fv.warmth/100, ex=fv.exposure/100;

  for(let i=0;i<src.length;i+=4) {
    let r=src[i],g=src[i+1],b=src[i+2];
    r*=(1+ex); g*=(1+ex); b*=(1+ex);
    r+=br*128; g+=br*128; b+=br*128;
    r=(r-128)*(1+co)+128; g=(g-128)*(1+co)+128; b=(b-128)*(1+co)+128;
    const gr=0.299*r+0.587*g+0.114*b;
    r=gr+sa*(r-gr); g=gr+sa*(g-gr); b=gr+sa*(b-gr);
    r+=wa*30; b-=wa*30;
    dst[i]=Math.min(255,Math.max(0,r));
    dst[i+1]=Math.min(255,Math.max(0,g));
    dst[i+2]=Math.min(255,Math.max(0,b));
    dst[i+3]=src[i+3];
  }
  ctx.putImageData(id,0,0);

  if(fv.sharpness>0) {
    const amt=fv.sharpness/100;
    const bc=document.createElement('canvas'); bc.width=w; bc.height=h;
    const bx=bc.getContext('2d'); bx.filter='blur(1px)'; bx.drawImage(cv,0,0);
    const bd=bx.getImageData(0,0,w,h), sd=ctx.getImageData(0,0,w,h);
    for(let i=0;i<sd.data.length;i+=4)
      for(let c=0;c<3;c++) {
        const d=sd.data[i+c]-bd.data[i+c];
        sd.data[i+c]=Math.min(255,Math.max(0,sd.data[i+c]+amt*d*2.5));
      }
    ctx.putImageData(sd,0,0);
  }

  const dc=document.getElementById('displayCanvas');
  dc.width=w; dc.height=h;
  dc.getContext('2d').drawImage(cv,0,0);
}

function resetAll() {
  FILTERS.forEach(f=>fv[f.id]=f.def);
  selectFilter(activeF); applyFilters();
  document.getElementById('badge').style.display='none';
  document.getElementById('btnUndo').style.display='none';
}

async function autoEnhance() {
  if(!origData||enhancing) return;
  enhancing=true;
  document.getElementById('btnAI').disabled=true;
  document.getElementById('overlay').classList.add('on');
  const steps=[
    {t:'Analyzing image...',v:20},{t:'Detecting details...',v:42},
    {t:'Enhancing colors...',v:60},{t:'Sharpening photo...',v:80},{t:'Finalizing...',v:100}
  ];
  for(const s of steps) {
    await sleep(380);
    document.getElementById('ovTxt').textContent=s.t;
    document.getElementById('progFill').style.width=s.v+'%';
    document.getElementById('progN').textContent=s.v+'%';
  }
  await sleep(200);
  fv={brightness:8,contrast:25,saturation:18,sharpness:45,warmth:5,exposure:5};
  selectFilter(activeF); applyFilters();
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('progFill').style.width='0%';
  document.getElementById('progN').textContent='0%';
  document.getElementById('btnAI').disabled=false;
  enhancing=false;
  document.getElementById('badge').style.display='block';
  document.getElementById('btnUndo').style.display='block';
}

function downloadImage() {
  const cv=document.getElementById('hiddenCanvas');
  if(!cv||!origData) return;
  const a=document.createElement('a');
  a.download='PhotoAI_Enhanced.jpg';
  a.href=cv.toDataURL('image/jpeg',0.95);
  a.click();
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
</script>
</body>
</html>
